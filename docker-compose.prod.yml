version: '3.8'

services:
  api:
    build:
      context: ./spring-backend
      dockerfile: Dockerfile
    container_name: tgdd-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: ${MONGODB_URI:-mongodb://localhost:27017/tgdd}
      SPRING_DATA_MONGODB_DATABASE: ${MONGODB_DATABASE:-tgdd}
      SERVER_PORT: 8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
