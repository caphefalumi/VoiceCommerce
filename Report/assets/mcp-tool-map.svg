<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980">
  <rect width="1400" height="980" fill="#f8fafc"/>
  <text x="700" y="52" text-anchor="middle" font-family="Arial" font-size="30" font-weight="bold" fill="#0f172a">AI Worker MCP Tool Ecosystem (Mock)</text>

  <rect x="560" y="110" width="280" height="95" rx="12" fill="#ede9fe" stroke="#6d28d9" stroke-width="3"/>
  <text x="700" y="165" text-anchor="middle" font-family="Arial" font-size="21" font-weight="bold" fill="#4c1d95">MCP Server</text>

  <g font-family="Arial" font-size="15" fill="#1e293b">
    <rect x="70" y="270" width="250" height="110" rx="12" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
    <text x="195" y="320" text-anchor="middle" font-weight="bold">Search Tools</text>
    <text x="195" y="350" text-anchor="middle">searchProducts</text>
    <text x="195" y="372" text-anchor="middle">filterProductsByPrice</text>

    <rect x="350" y="270" width="250" height="110" rx="12" fill="#dcfce7" stroke="#15803d" stroke-width="3"/>
    <text x="475" y="320" text-anchor="middle" font-weight="bold">Cart Tools</text>
    <text x="475" y="350" text-anchor="middle">viewCart / addToCart</text>
    <text x="475" y="372" text-anchor="middle">removeFromCart</text>

    <rect x="630" y="270" width="250" height="110" rx="12" fill="#fff7ed" stroke="#c2410c" stroke-width="3"/>
    <text x="755" y="320" text-anchor="middle" font-weight="bold">Checkout Tools</text>
    <text x="755" y="350" text-anchor="middle">startCheckout</text>
    <text x="755" y="372" text-anchor="middle">confirmCheckout</text>

    <rect x="910" y="270" width="250" height="110" rx="12" fill="#fef9c3" stroke="#a16207" stroke-width="3"/>
    <text x="1035" y="320" text-anchor="middle" font-weight="bold">Order Tools</text>
    <text x="1035" y="350" text-anchor="middle">getOrderStatus</text>
    <text x="1035" y="372" text-anchor="middle">cancelOrder</text>

    <rect x="1190" y="270" width="160" height="110" rx="12" fill="#fae8ff" stroke="#a21caf" stroke-width="3"/>
    <text x="1270" y="320" text-anchor="middle" font-weight="bold">FAQ</text>
    <text x="1270" y="350" text-anchor="middle">getFaqAnswer</text>

    <rect x="130" y="510" width="250" height="110" rx="12" fill="#ecfeff" stroke="#0e7490" stroke-width="3"/>
    <text x="255" y="560" text-anchor="middle" font-weight="bold">Wishlist Tools</text>
    <text x="255" y="590" text-anchor="middle">addToWishlist / viewWishlist</text>

    <rect x="430" y="510" width="250" height="110" rx="12" fill="#ffe4e6" stroke="#be123c" stroke-width="3"/>
    <text x="555" y="560" text-anchor="middle" font-weight="bold">Review Tools</text>
    <text x="555" y="590" text-anchor="middle">submitReview</text>

    <rect x="730" y="510" width="250" height="110" rx="12" fill="#f0fdf4" stroke="#15803d" stroke-width="3"/>
    <text x="855" y="560" text-anchor="middle" font-weight="bold">Address Tools</text>
    <text x="855" y="590" text-anchor="middle">saveAddress / getAddresses</text>

    <rect x="1030" y="510" width="250" height="110" rx="12" fill="#e0f2fe" stroke="#0369a1" stroke-width="3"/>
    <text x="1155" y="560" text-anchor="middle" font-weight="bold">Promo Tools</text>
    <text x="1155" y="590" text-anchor="middle">validatePromoCode</text>

    <rect x="560" y="740" width="280" height="130" rx="12" fill="#f1f5f9" stroke="#475569" stroke-width="3"/>
    <text x="700" y="790" text-anchor="middle" font-weight="bold">Data Backing</text>
    <text x="700" y="820" text-anchor="middle">D1 transactional tables</text>
    <text x="700" y="842" text-anchor="middle">Vectorize product/FAQ indexes</text>
  </g>

  <line x1="700" y1="205" x2="195" y2="270" stroke="#334155" stroke-width="2"/>
  <line x1="700" y1="205" x2="475" y2="270" stroke="#334155" stroke-width="2"/>
  <line x1="700" y1="205" x2="755" y2="270" stroke="#334155" stroke-width="2"/>
  <line x1="700" y1="205" x2="1035" y2="270" stroke="#334155" stroke-width="2"/>
  <line x1="700" y1="205" x2="1270" y2="270" stroke="#334155" stroke-width="2"/>

  <line x1="700" y1="205" x2="255" y2="510" stroke="#334155" stroke-width="2"/>
  <line x1="700" y1="205" x2="555" y2="510" stroke="#334155" stroke-width="2"/>
  <line x1="700" y1="205" x2="855" y2="510" stroke="#334155" stroke-width="2"/>
  <line x1="700" y1="205" x2="1155" y2="510" stroke="#334155" stroke-width="2"/>

  <line x1="195" y1="380" x2="700" y2="740" stroke="#64748b" stroke-width="2"/>
  <line x1="475" y1="380" x2="700" y2="740" stroke="#64748b" stroke-width="2"/>
  <line x1="755" y1="380" x2="700" y2="740" stroke="#64748b" stroke-width="2"/>
  <line x1="1035" y1="380" x2="700" y2="740" stroke="#64748b" stroke-width="2"/>
  <line x1="1270" y1="380" x2="700" y2="740" stroke="#64748b" stroke-width="2"/>
</svg>
