  <line x1="350" y1="210" x2="460" y2="210" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="760" y1="210" x2="860" y2="210" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="610" y1="290" x2="610" y2="390" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
