<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="840" viewBox="0 0 1400 840">
  <rect width="1400" height="840" fill="#f8fafc"/>
  <text x="700" y="50" text-anchor="middle" font-family="Arial" font-size="30" font-weight="bold" fill="#0f172a">TGDD Voice Commerce - High-Level System Architecture (Mock)</text>

  <rect x="90" y="140" width="260" height="140" rx="14" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
