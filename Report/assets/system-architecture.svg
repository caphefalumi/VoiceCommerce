  <text x="610" y="205" text-anchor="middle" font-family="Arial" font-size="16" fill="#4c1d95">Hono REST Routes</text>
  <text x="610" y="230" text-anchor="middle" font-family="Arial" font-size="16" fill="#4c1d95">Auth + Cart + Orders</text>
  <text x="610" y="255" text-anchor="middle" font-family="Arial" font-size="16" fill="#4c1d95">Admin + Promo + Logs</text>

  <rect x="860" y="120" width="300" height="170" rx="14" fill="#dcfce7" stroke="#15803d" stroke-width="3"/>
  <text x="1010" y="170" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#14532d">AI Worker</text>
  <text x="1010" y="205" text-anchor="middle" font-family="Arial" font-size="16" fill="#14532d">STT / TTS / Intent</text>
