  <text x="1010" y="255" text-anchor="middle" font-family="Arial" font-size="16" fill="#14532d">Voice Commerce Actions</text>

  <rect x="420" y="390" width="560" height="180" rx="14" fill="#fff7ed" stroke="#c2410c" stroke-width="3"/>
