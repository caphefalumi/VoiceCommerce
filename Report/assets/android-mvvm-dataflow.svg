<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <rect width="1400" height="820" fill="#f8fafc"/>
  <text x="700" y="52" text-anchor="middle" font-family="Arial" font-size="30" font-weight="bold" fill="#0f172a">Android MVVM Data Flow with Offline Fallback (Mock)</text>

  <rect x="120" y="140" width="260" height="130" rx="14" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
  <text x="250" y="195" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#1e3a8a">UI Layer</text>
  <text x="250" y="225" text-anchor="middle" font-family="Arial" font-size="16" fill="#1e3a8a">Fragments + Adapters</text>

  <rect x="450" y="140" width="260" height="130" rx="14" fill="#ede9fe" stroke="#6d28d9" stroke-width="3"/>
  <text x="580" y="195" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#4c1d95">ViewModel</text>
  <text x="580" y="225" text-anchor="middle" font-family="Arial" font-size="16" fill="#4c1d95">LiveData + State</text>

  <rect x="780" y="140" width="260" height="130" rx="14" fill="#dcfce7" stroke="#15803d" stroke-width="3"/>
  <text x="910" y="195" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#14532d">Repository</text>
  <text x="910" y="225" text-anchor="middle" font-family="Arial" font-size="16" fill="#14532d">Business + Sync Logic</text>

  <rect x="1110" y="120" width="220" height="90" rx="12" fill="#fef9c3" stroke="#a16207" stroke-width="3"/>
  <text x="1220" y="175" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#78350f">Remote API</text>

  <rect x="1110" y="230" width="220" height="90" rx="12" fill="#fff7ed" stroke="#c2410c" stroke-width="3"/>
  <text x="1220" y="285" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#9a3412">Room Cache</text>

  <rect x="260" y="430" width="880" height="200" rx="16" fill="#ecfeff" stroke="#0e7490" stroke-width="3"/>
  <text x="700" y="475" text-anchor="middle" font-family="Arial" font-size="24" font-weight="bold" fill="#0f766e">Observed Runtime Pattern</text>
  <text x="700" y="515" text-anchor="middle" font-family="Arial" font-size="17" fill="#115e59">1) User action in Fragment triggers ViewModel intent</text>
  <text x="700" y="545" text-anchor="middle" font-family="Arial" font-size="17" fill="#115e59">2) ViewModel calls Repository using coroutines</text>
  <text x="700" y="575" text-anchor="middle" font-family="Arial" font-size="17" fill="#115e59">3) Repository checks connectivity and chooses remote-first or local fallback</text>
  <text x="700" y="605" text-anchor="middle" font-family="Arial" font-size="17" fill="#115e59">4) Result updates LiveData and UI state (loading/error/success)</text>

  <line x1="380" y1="205" x2="450" y2="205" stroke="#334155" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="710" y1="205" x2="780" y2="205" stroke="#334155" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="1040" y1="185" x2="1110" y2="165" stroke="#334155" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="1040" y1="225" x2="1110" y2="275" stroke="#334155" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="580" y1="270" x2="580" y2="430" stroke="#334155" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="910" y1="270" x2="910" y2="430" stroke="#334155" stroke-width="3" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>
</svg>
