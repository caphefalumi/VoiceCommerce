<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <rect width="1400" height="900" fill="#f8fafc"/>
  <text x="700" y="54" text-anchor="middle" font-family="Arial" font-size="30" font-weight="bold" fill="#0f172a">API Worker Route Domains (Mock)</text>

  <rect x="550" y="120" width="300" height="100" rx="12" fill="#ede9fe" stroke="#6d28d9" stroke-width="3"/>
  <text x="700" y="175" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="#4c1d95">apps/api-worker/src/index.ts</text>

  <g font-family="Arial" font-size="16" fill="#1e293b">
    <rect x="90" y="300" width="230" height="120" rx="12" fill="#dbeafe" stroke="#1d4ed8" stroke-width="3"/>
    <text x="205" y="350" text-anchor="middle" font-weight="bold">Auth</text>
    <text x="205" y="378" text-anchor="middle">email / password</text>
    <text x="205" y="402" text-anchor="middle">session / oauth</text>

    <rect x="350" y="300" width="230" height="120" rx="12" fill="#dcfce7" stroke="#15803d" stroke-width="3"/>
    <text x="465" y="350" text-anchor="middle" font-weight="bold">Products</text>
    <text x="465" y="378" text-anchor="middle">catalog listing</text>
    <text x="465" y="402" text-anchor="middle">details/search/filter</text>

    <rect x="610" y="300" width="230" height="120" rx="12" fill="#fff7ed" stroke="#c2410c" stroke-width="3"/>
    <text x="725" y="350" text-anchor="middle" font-weight="bold">Cart</text>
    <text x="725" y="378" text-anchor="middle">add / patch / delete</text>
    <text x="725" y="402" text-anchor="middle">user-scoped access</text>

    <rect x="870" y="300" width="230" height="120" rx="12" fill="#fef9c3" stroke="#a16207" stroke-width="3"/>
    <text x="985" y="350" text-anchor="middle" font-weight="bold">Orders</text>
    <text x="985" y="378" text-anchor="middle">checkout records</text>
    <text x="985" y="402" text-anchor="middle">status tracking</text>

    <rect x="1130" y="300" width="190" height="120" rx="12" fill="#fae8ff" stroke="#a21caf" stroke-width="3"/>
    <text x="1225" y="350" text-anchor="middle" font-weight="bold">Admin</text>
    <text x="1225" y="378" text-anchor="middle">promo codes</text>
    <text x="1225" y="402" text-anchor="middle">voice logs</text>

    <rect x="220" y="520" width="230" height="120" rx="12" fill="#ecfeff" stroke="#0e7490" stroke-width="3"/>
    <text x="335" y="570" text-anchor="middle" font-weight="bold">Promo</text>
    <text x="335" y="598" text-anchor="middle">validate/apply</text>

    <rect x="500" y="520" width="230" height="120" rx="12" fill="#f0fdf4" stroke="#15803d" stroke-width="3"/>
    <text x="615" y="570" text-anchor="middle" font-weight="bold">Search History</text>
    <text x="615" y="598" text-anchor="middle">save/list/delete</text>

    <rect x="780" y="520" width="230" height="120" rx="12" fill="#ffe4e6" stroke="#be123c" stroke-width="3"/>
    <text x="895" y="570" text-anchor="middle" font-weight="bold">Payment / Mail</text>
    <text x="895" y="598" text-anchor="middle">checkout + confirmations</text>

    <rect x="1060" y="520" width="230" height="120" rx="12" fill="#e0f2fe" stroke="#0369a1" stroke-width="3"/>
    <text x="1175" y="570" text-anchor="middle" font-weight="bold">Middleware Guards</text>
    <text x="1175" y="598" text-anchor="middle">requireAuth / requireAdmin</text>
  </g>

  <line x1="700" y1="220" x2="205" y2="300" stroke="#334155" stroke-width="2"/>
  <line x1="700" y1="220" x2="465" y2="300" stroke="#334155" stroke-width="2"/>
  <line x1="700" y1="220" x2="725" y2="300" stroke="#334155" stroke-width="2"/>
  <line x1="700" y1="220" x2="985" y2="300" stroke="#334155" stroke-width="2"/>
  <line x1="700" y1="220" x2="1225" y2="300" stroke="#334155" stroke-width="2"/>

  <line x1="700" y1="220" x2="335" y2="520" stroke="#334155" stroke-width="2"/>
  <line x1="700" y1="220" x2="615" y2="520" stroke="#334155" stroke-width="2"/>
  <line x1="700" y1="220" x2="895" y2="520" stroke="#334155" stroke-width="2"/>
  <line x1="700" y1="220" x2="1175" y2="520" stroke="#334155" stroke-width="2"/>
</svg>
