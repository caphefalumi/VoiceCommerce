name: CD (AI Worker)

on:
  push:
    branches: [main]
    paths:
      - "apps/ai-worker/**"
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:
  workflow_run:
    workflows: [CI (AI Worker)]
    types: [completed]
    branches: [main]

concurrency:
  group: cd-ai-worker-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: ver
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="staging-${SHORT_SHA}"
          fi
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"

  deploy-ai-worker:
    name: Deploy AI Worker → ${{ needs.version.outputs.version }}
    runs-on: ubuntu-latest
    needs: [version]
    environment:
      name: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
        with:
          working-directory: apps/ai-worker

      - name: Deploy AI Worker (staging)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: apps/ai-worker
          command: deploy --env staging

      - name: Deploy AI Worker (production)
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: apps/ai-worker
          command: deploy

      - name: Tag version in worker metadata
        run: |
          echo "### 🤖 AI Worker deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ needs.version.outputs.version }}"  >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}"             >> $GITHUB_STEP_SUMMARY
