# ─────────────────────────────────────────────────────────────────────────────
# IaC — Terraform plan (PRs) + apply (main)
#
# Pre-requisites (GitHub Secrets):
#   TF_API_TOKEN          — Terraform Cloud user token  (or remove if using R2)
#   CF_API_TOKEN          — Cloudflare API token (scopes in security docs)
#   CF_ACCOUNT_ID         — Cloudflare Account ID
#   GITHUB_OWNER          — GitHub organisation / username
# ─────────────────────────────────────────────────────────────────────────────
name: IaC (Terraform)

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
  pull_request:
    branches: [main]
    paths:
      - "infra/terraform/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write   # needed to post plan output as PR comment

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'pull_request' && 'Plan' || 'Apply' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform

    env:
      TF_VAR_cloudflare_api_token:   ${{ secrets.CF_API_TOKEN }}
      TF_VAR_cloudflare_account_id:  ${{ secrets.CF_ACCOUNT_ID }}
      TF_VAR_github_owner:           ${{ secrets.GITHUB_OWNER }}
      TF_VAR_github_repo:            tgdd
      # Terraform Cloud token (used when cloud backend block is uncommented)
      TF_TOKEN_app_terraform_io:     ${{ secrets.TF_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: terraform fmt check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: false

      - name: terraform init
        id: init
        run: terraform init

      - name: terraform validate
        id: validate
        run: terraform validate

      # ── On PRs: plan only (never apply) ─────────────────────────────────────
      - name: terraform plan
        id: plan
        if: github.event_name == 'pull_request'
        run: terraform plan -no-color -var-file=prod.tfvars
        continue-on-error: true

      # Post plan output as a sticky PR comment
      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          PLAN: ${{ steps.plan.outputs.stdout }}
        with:
          script: |
            const body = `## 🏗️ Terraform Plan
            \`\`\`
            ${process.env.PLAN}
            \`\`\`
            *Triggered by: @${{ github.actor }} — ${{ github.event_name }}*`;

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('🏗️ Terraform Plan'));
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo, issue_number: context.issue.number, body,
              });
            }

      - name: Fail if plan errored
        if: github.event_name == 'pull_request' && steps.plan.outcome == 'failure'
        run: exit 1

      # ── On main: apply ────────────────────────────────────────────────────────
      - name: terraform apply
        if: github.event_name != 'pull_request'
        run: terraform apply -auto-approve -var-file=prod.tfvars
