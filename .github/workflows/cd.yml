# ─────────────────────────────────────────────────────────────────────────────
# CD — Deploy to Staging (main) and Production (tags)
#
# Flow:
#   push → main           → deploy everything to *staging* environments
#   push tag vX.Y.Z       → deploy everything to *production* environments
#
# Versioning:  semver tags drive production releases.
# Rollback:    re-run any previous successful production workflow using
#              "Re-run jobs" in GitHub UI, or use the wrangler CLI command
#              shown in the README (wrangler rollback).
#
# Pre-requisites (GitHub Secrets):
#   CF_API_TOKEN       — Cloudflare API token (see least-privilege IAM notes)
#   CF_ACCOUNT_ID      — Cloudflare Account ID
# ─────────────────────────────────────────────────────────────────────────────
name: CD

on:
  push:
    branches: [main]
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options: [staging, production]
  workflow_run:
    workflows: [CI, Security, Terraform, Lint & Format]
    types: [completed]
    branches: [main]

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

# ── Environment matrix helper ─────────────────────────────────────────────────
# staging  → branch main,  wrangler env "staging"  / CF Pages branch preview
# production → semver tag, wrangler env "production" / CF Pages production

jobs:
  # ── Versioning ───────────────────────────────────────────────────────────────
  version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      short_sha: ${{ steps.ver.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: ver
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="staging-${SHORT_SHA}"
          fi
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

  # ── Deploy: Frontend (Cloudflare Pages) ─────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → ${{ needs.version.outputs.version }}
    runs-on: ubuntu-latest
    needs: [version]
    environment:
      name: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}
      url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Build
        run: bun run build
        env:
          VITE_APP_VERSION: ${{ needs.version.outputs.version }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy dist --project-name=tgdd-frontend ${{ startsWith(github.ref, 'refs/tags/v') && '--branch=main' || '--branch=staging' }}

      - name: Annotate deployment
        run: |
          echo "### 🚀 Frontend deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ needs.version.outputs.version }}"   >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}"              >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ steps.deploy.outputs.deployment-url }}" >> $GITHUB_STEP_SUMMARY

  # ── Deploy: AI Worker ────────────────────────────────────────────────────────
  deploy-ai-worker:
    name: Deploy AI Worker → ${{ needs.version.outputs.version }}
    runs-on: ubuntu-latest
    needs: [version]
    environment:
      name: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install
        working-directory: ai-worker

      - name: Deploy AI Worker (staging)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: ai-worker
          command: deploy --env staging

      - name: Deploy AI Worker (production)
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: ai-worker
          command: deploy

      - name: Tag version in worker metadata
        run: |
          echo "### 🤖 AI Worker deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ needs.version.outputs.version }}"  >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}"             >> $GITHUB_STEP_SUMMARY

  # ── Deploy: API Worker ───────────────────────────────────────────────────────
  deploy-api-worker:
    name: Deploy API Worker → ${{ needs.version.outputs.version }}
    runs-on: ubuntu-latest
    needs: [version]
    environment:
      name: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install
        working-directory: api-worker

      - name: Deploy API Worker (staging)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: api-worker
          command: deploy --env staging

      - name: Deploy API Worker (production)
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: api-worker
          command: deploy

      - name: Annotate
        run: |
          echo "### 🔌 API Worker deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ needs.version.outputs.version }}"  >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}"             >> $GITHUB_STEP_SUMMARY

  # ── Post-deploy smoke test ────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test (staging)
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-ai-worker, deploy-api-worker]
    if: ${{ startsWith(github.ref, 'refs/tags/v') == false }}

    steps:
      - uses: actions/checkout@v4

      - name: Health-check AI Worker
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://ai-worker-staging.dangduytoan13l.workers.dev/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ AI Worker health-check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ AI Worker healthy"

      - name: Health-check API Worker
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://api-worker-staging.dangduytoan13l.workers.dev/health)
          if [ "$STATUS" != "200" ]; then
            echo "❌ API Worker health-check failed (HTTP $STATUS)"
            exit 1
          fi
          echo "✅ API Worker healthy"
