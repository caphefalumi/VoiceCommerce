name: Security

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-security:
    name: Frontend — bun audit + Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: bun audit
        run: bun pm -a
        continue-on-error: false

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          scanners: vuln,secret
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  ai-worker-security:
    name: AI Worker — bun audit + Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: ai-worker

      - name: bun audit
        run: bun pm -a
        working-directory: ai-worker
        continue-on-error: false

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'ai-worker'
          scanners: vuln,secret
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  api-worker-security:
    name: API Worker — bun audit + Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: api-worker

      - name: bun audit
        run: bun pm -a
        working-directory: api-worker
        continue-on-error: false

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'api-worker'
          scanners: vuln,secret
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  trivy-iac:
    name: Trivy IaC Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy IaC scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'infra/terraform'
          scanners: misconfig,secret
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '1'
