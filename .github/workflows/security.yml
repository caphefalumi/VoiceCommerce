# ─────────────────────────────────────────────────────────────────────────────
# Security — npm audit + OSV scan
# Runs on every push and PR
# ─────────────────────────────────────────────────────────────────────────────
name: Security

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Frontend security ──────────────────────────────────────────────────
  frontend-security:
    name: Frontend — npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: false

  # ── 2. AI Worker security ─────────────────────────────────────────────────
  ai-worker-security:
    name: AI Worker — npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-worker

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ai-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: false

  # ── 3. API Worker security ─────────────────────────────────────────────────
  api-worker-security:
    name: API Worker — npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-worker

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: false
