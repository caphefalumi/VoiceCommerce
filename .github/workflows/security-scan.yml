name: Security Scan

on:
  push:
    branches: ["**"]
    paths:
      - "apps/web/package.json"
      - "apps/ai-worker/package.json"
      - "apps/api-worker/package.json"
      - "infra/terraform/**"
      - ".github/workflows/security-scan.yml"
      - ".github/workflows/codeql.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/web/package.json"
      - "apps/ai-worker/package.json"
      - "apps/api-worker/package.json"
      - "infra/terraform/**"
      - ".github/workflows/security-scan.yml"
      - ".github/workflows/codeql.yml"
  schedule:
    - cron: '42 19 * * 1'

concurrency:
  group: security-scan-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  trivy-frontend:
    name: Frontend — Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/web

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: 'fs'
          scan-ref: 'apps/web'
          scanners: vuln,secret
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  trivy-ai-worker:
    name: AI Worker — Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/ai-worker

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: 'fs'
          scan-ref: 'apps/ai-worker'
          scanners: vuln,secret
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  trivy-api-worker:
    name: API Worker — Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/api-worker

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: 'fs'
          scan-ref: 'apps/api-worker'
          scanners: vuln,secret
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  trivy-iac:
    name: Terraform — IaC Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy IaC scanner
        uses: aquasecurity/trivy-action@0.29.0
        with:
          scan-type: 'fs'
          scan-ref: 'infra/terraform'
          scanners: misconfig,secret
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
