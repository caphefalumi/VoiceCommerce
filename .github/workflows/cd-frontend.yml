name: CD (Frontend)

on:
  push:
    branches: [main]
    paths:
      - "apps/web/src/**"
      - "apps/web/public/**"
      - "apps/web/package.json"
      - "apps/web/vite.config.ts"
      - "apps/web/index.html"
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: staging
        type: choice
        options: [staging, production]
  workflow_run:
    workflows: [CI (Frontend)]
    types: [completed]
    branches: [main]

concurrency:
  group: cd-frontend-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      short_sha: ${{ steps.ver.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: ver
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="staging-${SHORT_SHA}"
          fi
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

  deploy-frontend:
    name: Deploy Frontend → ${{ needs.version.outputs.version }}
    runs-on: ubuntu-latest
    needs: [version]
    environment:
      name: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}
      url: ${{ steps.deploy.outputs.deployment-url }}

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
        with:
          working-directory: apps/web

      - name: Build
        run: bun run build
        working-directory: apps/web
        env:
          VITE_APP_VERSION: ${{ needs.version.outputs.version }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: pages deploy dist --project-name=tgdd-frontend ${{ startsWith(github.ref, 'refs/tags/v') && '--branch=main' || '--branch=staging' }}

      - name: Annotate deployment
        run: |
          echo "### 🚀 Frontend deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ needs.version.outputs.version }}"   >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}"              >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ steps.deploy.outputs.deployment-url }}" >> $GITHUB_STEP_SUMMARY
