name: CD (API Worker)

on:
  push:
    branches: [main]
    paths:
      - "apps/api-worker/**"
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:
  workflow_run:
    workflows: [CI (API Worker)]
    types: [completed]
    branches: [main]

concurrency:
  group: cd-api-worker-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

jobs:
  version:
    name: Determine version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: ver
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="staging-${SHORT_SHA}"
          fi
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"

  deploy-api-worker:
    name: Deploy API Worker → ${{ needs.version.outputs.version }}
    runs-on: ubuntu-latest
    needs: [version]
    environment:
      name: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
        with:
          working-directory: apps/api-worker

      - name: Deploy API Worker (staging)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: apps/api-worker
          command: deploy --env staging

      - name: Deploy API Worker (production)
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: apps/api-worker
          command: deploy

      - name: Annotate deployment
        run: |
          echo "### 🔌 API Worker deployed" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ needs.version.outputs.version }}"  >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}"             >> $GITHUB_STEP_SUMMARY
