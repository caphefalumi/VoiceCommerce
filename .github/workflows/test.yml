name: Tests

on:
  push:
    branches: ["**"]
    paths:
      - "apps/web/src/**"
      - "apps/web/tests/**"
      - "apps/web/package.json"
      - "apps/api-worker/**"
      - "apps/ai-worker/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/web/src/**"
      - "apps/web/tests/**"
      - "apps/web/package.json"
      - "apps/api-worker/**"
      - "apps/ai-worker/**"

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-test:
    name: Frontend — Tests
    runs-on: ubuntu-latest
    if: >
      contains(github.event.head_commit.modified, 'apps/web/src/') ||
      contains(github.event.head_commit.modified, 'apps/web/tests/') ||
      contains(github.event.head_commit.added, 'apps/web/src/') ||
      contains(github.event.head_commit.added, 'apps/web/tests/') ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/web

      - name: Run tests
        run: bun run test --run --reporter=dot --coverage || bun test --reporter=dot --coverage
        working-directory: apps/web

  ai-worker-test:
    name: AI Worker — Tests
    runs-on: ubuntu-latest
    if: >
      contains(github.event.head_commit.modified, 'apps/ai-worker/') ||
      contains(github.event.head_commit.added, 'apps/ai-worker/') ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/ai-worker

      - name: Run tests
        run: bun test
        working-directory: apps/ai-worker

  api-worker-test:
    name: API Worker — Tests
    runs-on: ubuntu-latest
    if: >
      contains(github.event.head_commit.modified, 'apps/api-worker/') ||
      contains(github.event.head_commit.added, 'apps/api-worker/') ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: apps/api-worker

      - name: TypeScript type-check
        run: bunx tsc --noEmit
        working-directory: apps/api-worker

      - name: Run tests
        run: bun test src/
        working-directory: apps/api-worker
