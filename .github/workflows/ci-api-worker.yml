name: CI (API Worker)

on:
  push:
    branches: ["**"]
    paths:
      - "apps/api-worker/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/api-worker/**"

concurrency:
  group: ci-api-worker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api-worker-ci:
    name: API Worker — Type-check / Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
        with:
          working-directory: apps/api-worker

      - name: TypeScript type-check
        run: bunx tsc --noEmit
        working-directory: apps/api-worker

      - name: Dry-run build (wrangler)
        run: bunx wrangler deploy --dry-run --outdir /tmp/api-worker-dist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        working-directory: apps/api-worker
