# ─────────────────────────────────────────────────────────────────────────────
# CI — Lint · Unit Tests · Build · Security Scan
# Runs on every push and PR; deployment workflows are gated behind this job.
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Frontend ─────────────────────────────────────────────────────────────
  frontend-ci:
    name: Frontend — Lint / Test / Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --reporter=verbose --coverage

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ── 2. AI Worker ────────────────────────────────────────────────────────────
  ai-worker-ci:
    name: AI Worker — Lint / Type-check / Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-worker

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ai-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Dry-run build (wrangler)
        run: npx wrangler deploy --dry-run --outdir /tmp/ai-worker-dist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  # ── 3. API Worker ───────────────────────────────────────────────────────────
  api-worker-ci:
    name: API Worker — Type-check / Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-worker

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api-worker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Dry-run build (wrangler)
        run: npx wrangler deploy --dry-run --outdir /tmp/api-worker-dist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  # ── 4. Security — dependency audit ──────────────────────────────────────────
  security-scan:
    name: Security — npm audit + OSV scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: npm audit (frontend — high+)
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: npm audit (ai-worker)
        run: npm audit --audit-level=high
        working-directory: ai-worker
        continue-on-error: false

      - name: npm audit (api-worker)
        run: npm audit --audit-level=high
        working-directory: api-worker
        continue-on-error: false

      # OSV-Scanner: cross-references all lock-files against the OSV database
      - name: OSV-Scanner
        uses: google/osv-scanner-action@v2
        with:
          scan-args: |-
            --lockfile=package-lock.json
            --lockfile=ai-worker/package-lock.json
            --lockfile=api-worker/package-lock.json

  # ── 5. Terraform validate ───────────────────────────────────────────────────
  terraform-validate:
    name: Terraform — fmt + validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform init (backend=false)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate
