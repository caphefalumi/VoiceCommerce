version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: tgdd-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: tgdd

  api:
    build:
      context: ./spring-backend
      dockerfile: Dockerfile
    container_name: tgdd-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/tgdd
      SPRING_DATA_MONGODB_DATABASE: tgdd
      SERVER_PORT: 8080
    depends_on:
      - mongodb
    restart: unless-stopped

volumes:
  mongodb_data:
